apiVersion: sandbox.fast.io/v1alpha1
kind: SandboxPool
metadata:
  name: kata-clh-pool
  namespace: default
spec:
  runtimeType: kata-clh
  maxSandboxesPerPod: 3
  capacity:
    poolMin: 1
    poolMax: 2
  agentTemplate:
    spec:
      containers:
      - name: agent
        image: fast-sandbox/agent:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: RUNTIME_SOCKET
          value: /run/containerd/containerd.sock