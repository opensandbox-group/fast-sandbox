# gVisor Kind cluster configuration
# This config mounts host's gVisor binaries into Kind nodes
#
# Prerequisites:
#   - runsc installed on host (e.g., /usr/bin/runsc)
#   - containerd-shim-runsc-v1 installed on host (e.g., /usr/local/bin/containerd-shim-runsc-v1)
#
# Usage:
#   GVISOR_KIND_CLUSTER=gvisor-sandbox PWD=$(pwd) envsubst < kind-config-gvisor.yaml | kind create cluster --config -
#
# Or use setup-kind-gvisor.sh script

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ${GVISOR_KIND_CLUSTER}

# Configure containerd to use gVisor runsc runtime
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
      runtime_type = "io.containerd.runsc.v1"
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc.options]
        TypeUrl = "io.containerd.runsc.v1.options"
        ConfigPath = "/etc/containerd/runsc.toml"

nodes:
  - role: control-plane
    image: ${GVISOR_KIND_IMAGE}
    extraMounts:
      # Mount gVisor binaries from host
      - hostPath: ${GVISOR_RUNSC_BIN}
        containerPath: /usr/bin/runsc
        readOnly: true
      - hostPath: ${GVISOR_SHIM_BIN}
        containerPath: /usr/bin/containerd-shim-runsc-v1
        readOnly: true