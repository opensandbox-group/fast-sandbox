apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fast-sandbox-janitor
  namespace: default
  labels:
    app: fast-sandbox-janitor
spec:
  selector:
    matchLabels:
      app: fast-sandbox-janitor
  template:
    metadata:
      labels:
        app: fast-sandbox-janitor
    spec:
      serviceAccountName: fast-sandbox-janitor
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
      - operator: Exists
      containers:
      - name: janitor
        image: fast-sandbox/janitor:dev
        imagePullPolicy: IfNotPresent
        command: ["/workspace/janitor"]
        args: ["--scan-interval=2m", "--orphan-timeout=30s"]
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: sock
          mountPath: /run/containerd/containerd.sock
        - name: fifo
          mountPath: /run/containerd/fifo
        - name: network-state
          mountPath: /run/fast-sandbox/network
        - name: network-namespaces
          mountPath: /run/netns
          mountPropagation: Bidirectional
        - name: boxlite-state
          mountPath: /var/lib/fast-sandbox/boxlite
      volumes:
      - name: sock
        hostPath:
          path: /run/containerd/containerd.sock
          type: Socket
      - name: fifo
        hostPath:
          path: /run/containerd/fifo
          type: DirectoryOrCreate
      - name: network-state
        hostPath:
          path: /run/fast-sandbox/network
          type: DirectoryOrCreate
      - name: network-namespaces
        hostPath:
          path: /run/fast-sandbox/netns
          type: DirectoryOrCreate
      - name: boxlite-state
        hostPath:
          path: /var/lib/fast-sandbox/boxlite
          type: DirectoryOrCreate
