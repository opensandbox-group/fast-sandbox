apiVersion: sandbox.fast.io/v1alpha1
kind: SandboxPool
metadata:
  name: kata-qemu-pool
  namespace: default
spec:
  runtime: kata-qemu
  infraProfile: minimal
  sandboxResources:
    cpu: 250m
    memory: 256Mi
    pids: 128
  capacity:
    poolMin: 1
    poolMax: 1
    bufferMin: 0
    bufferMax: 0
  maxSandboxesPerPod: 5
  fastletTemplate:
    spec:
      containers:
      - name: fastlet
        image: fast-sandbox/fastlet:dev
        imagePullPolicy: IfNotPresent
