apiVersion: sandbox.fast.io/v1alpha1
kind: SandboxPool
metadata:
  name: default-pool
  namespace: default
spec:
  fastletTemplate:
    spec:
      containers:
      - image: fast-sandbox/fastlet:dev
        imagePullPolicy: IfNotPresent
        name: fastlet
  capacity:
    poolMax: 1
    poolMin: 1
    bufferMin: 0
    bufferMax: 0
  maxSandboxesPerPod: 5
  runtime: container
  infraProfile: minimal
  sandboxResources:
    cpu: 250m
    memory: 256Mi
    pids: 128
  warmImages:
  - docker.io/library/alpine:latest
---
# Example: gVisor pool for untrusted code execution
apiVersion: sandbox.fast.io/v1alpha1
kind: SandboxPool
metadata:
  name: gvisor-pool
  namespace: default
spec:
  fastletTemplate:
    spec:
      containers:
      - image: fast-sandbox/fastlet:dev
        imagePullPolicy: IfNotPresent
        name: fastlet
  capacity:
    poolMax: 3
    poolMin: 1
    bufferMin: 0
    bufferMax: 0
  maxSandboxesPerPod: 5
  runtime: gvisor
  infraProfile: minimal
  sandboxResources:
    cpu: 250m
    memory: 256Mi
    pids: 128
---
# Example: Kata QEMU pool for maximum isolation
apiVersion: sandbox.fast.io/v1alpha1
kind: SandboxPool
metadata:
  name: kata-pool
  namespace: default
spec:
  fastletTemplate:
    spec:
      containers:
      - image: fast-sandbox/fastlet:dev
        imagePullPolicy: IfNotPresent
        name: fastlet
  capacity:
    poolMax: 2
    poolMin: 1
    bufferMin: 0
    bufferMax: 0
  maxSandboxesPerPod: 3
  runtime: kata-qemu
  infraProfile: minimal
  sandboxResources:
    cpu: 500m
    memory: 512Mi
    pids: 128
