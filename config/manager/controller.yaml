apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-sandbox-controller
  namespace: default
  labels:
    app: fast-sandbox-controller
    fast-sandbox.io/control-plane-role: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      control-plane: controller-manager
      app: fast-sandbox-controller
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app: fast-sandbox-controller
        fast-sandbox.io/control-plane-role: controller
    spec:
      serviceAccountName: fast-sandbox-controller
      containers:
      - name: manager
        image: fast-sandbox/controller:dev
        imagePullPolicy: IfNotPresent
        command: ["./controller"]
        args:
        - --role=controller
        - --metrics-bind-address=:9091
        - --health-probe-bind-address=:5758
        env:
        - name: FAST_SANDBOX_ROUTE_VERIFY_PUBLIC_KEY
          valueFrom:
            secretKeyRef: {name: fast-sandbox-route-keys, key: public-key}
        ports:
        - {name: health, containerPort: 5758}
        - {name: metrics, containerPort: 9091}
        readinessProbe:
          httpGet: {path: /readyz, port: health}
        livenessProbe:
          httpGet: {path: /healthz, port: health}
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: "1", memory: 512Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-sandbox-fastpath
  namespace: default
  labels:
    app: fast-sandbox-fastpath
    fast-sandbox.io/control-plane-role: fastpath
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fast-sandbox-fastpath
      fast-sandbox.io/control-plane-role: fastpath
  template:
    metadata:
      labels:
        app: fast-sandbox-fastpath
        fast-sandbox.io/control-plane-role: fastpath
    spec:
      serviceAccountName: fast-sandbox-fastpath
      containers:
      - name: manager
        image: fast-sandbox/controller:dev
        imagePullPolicy: IfNotPresent
        command: ["./controller"]
        args:
        - --role=fastpath
        - --metrics-bind-address=:9091
        - --health-probe-bind-address=:5758
        - --fastpath-bind-address=:9090
        env:
        - name: FAST_SANDBOX_ROUTE_SIGNING_PRIVATE_KEY
          valueFrom:
            secretKeyRef: {name: fast-sandbox-route-keys, key: private-key}
        ports:
        - {name: grpc, containerPort: 9090}
        - {name: health, containerPort: 5758}
        - {name: metrics, containerPort: 9091}
        readinessProbe:
          httpGet: {path: /readyz, port: health}
        livenessProbe:
          httpGet: {path: /healthz, port: health}
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: fast-sandbox-fastpath
  namespace: default
spec:
  selector:
    app: fast-sandbox-fastpath
    fast-sandbox.io/control-plane-role: fastpath
  ports:
  - name: grpc
    port: 9090
    targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-sandbox-proxy
  namespace: default
  labels: {app: fast-sandbox-proxy}
spec:
  replicas: 2
  selector:
    matchLabels: {app: fast-sandbox-proxy}
  template:
    metadata:
      labels: {app: fast-sandbox-proxy}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9094"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: fast-sandbox-proxy
      containers:
      - name: proxy
        image: fast-sandbox/sandbox-proxy:dev
        imagePullPolicy: IfNotPresent
        args: ["--bind-address=:8080", "--metrics-bind-address=:9094", "--fastlet-proxy-port=5780"]
        env:
        - name: FAST_SANDBOX_ROUTE_VERIFY_PUBLIC_KEY
          valueFrom:
            secretKeyRef: {name: fast-sandbox-route-keys, key: public-key}
        ports:
        - {name: http, containerPort: 8080}
        - {name: metrics, containerPort: 9094}
        readinessProbe:
          httpGet: {path: /readyz, port: http}
        livenessProbe:
          httpGet: {path: /healthz, port: http}
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {cpu: "1", memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: fast-sandbox-proxy
  namespace: default
spec:
  selector: {app: fast-sandbox-proxy}
  ports:
  - {name: http, port: 8080, targetPort: http}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fast-sandbox-controller
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fast-sandbox-controller
      fast-sandbox.io/control-plane-role: controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fast-sandbox-fastpath
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fast-sandbox-fastpath
      fast-sandbox.io/control-plane-role: fastpath
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fast-sandbox-proxy
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: fast-sandbox-proxy}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fast-sandbox-fastpath
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fast-sandbox-fastpath
  minReplicas: 3
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
