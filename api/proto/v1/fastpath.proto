syntax = "proto3";

package fastpath.v1;

option go_package = "fast-sandbox/api/proto/v1;fastpathv1";

service FastPathService {
  // CreateSandbox performs the imperative low-latency create path. It reserves
  // Fastlet capacity, commits a Sandbox CRD, and then ensures the runtime.
  rpc CreateSandbox(CreateRequest) returns (CreateResponse);

  // DeleteSandbox commits declarative deletion; Controller reconciliation owns cleanup.
  rpc DeleteSandbox(DeleteRequest) returns (DeleteResponse);

  // UpdateSandbox commits declarative expiry, reset, or failure-policy intent.
  rpc UpdateSandbox(UpdateRequest) returns (UpdateResponse);

  // ListSandboxes 获取沙箱列表
  rpc ListSandboxes(ListRequest) returns (ListResponse);

  // GetSandbox 获取沙箱详情
  rpc GetSandbox(GetRequest) returns (SandboxInfo);

  // ResolveEndpoint resolves an authenticated proxy route for a target port.
  rpc ResolveEndpoint(ResolveEndpointRequest) returns (ResolveEndpointResponse);

  // IssueRouteCredential refreshes a short-lived credential for an existing route.
  rpc IssueRouteCredential(IssueRouteCredentialRequest) returns (IssueRouteCredentialResponse);
}

message ListRequest {
  string namespace = 1;
}

message ListResponse {
  repeated SandboxInfo items = 1;
}

message GetRequest {
  string sandbox_name = 1;  // CRD name (user-provided)
  string namespace = 2;     // optional, default "default"
}

message SandboxInfo {
  string sandbox_uid = 1;          // Kubernetes Sandbox CRD UID
  string sandbox_name = 2;         // CRD name (user-provided)
  string runtime_state = 3;
  string data_plane_state = 4;
  string user_process_state = 5;
  string fastlet_pod = 6;
  int64 created_at = 7;
  string image = 8;
  string pool_ref = 9;
}

message CreateRequest {
  string image = 1;
  string pool_ref = 2;
  repeated string command = 3;
  repeated string args = 4;
  string namespace = 5; // 可选，默认为 "default"
  string name = 6; // 可选，指定沙箱名称（用于测试故障注入）
  map<string, string> envs = 7; // 环境变量
  string working_dir = 8; // 工作目录
  string request_id = 9; // required stable idempotency key generated by SDK/fastctl
}

message CreateResponse {
  string sandbox_uid = 1;     // Kubernetes Sandbox CRD UID
  string sandbox_name = 2;    // CRD name (user-provided)
  string fastlet_pod = 3;
}

message ResolveEndpointRequest {
  string sandbox_uid = 1;
  uint32 target_port = 2;
  string protocol = 3; // http, https, grpc, tcp; initial proxy support is profile-dependent
}

message ResolveEndpointResponse {
  string sandbox_uid = 1;
  uint32 target_port = 2;
  string proxy_endpoint = 3;
  map<string, string> required_headers = 4;
  int64 route_generation = 5;
  int64 expires_at_unix_seconds = 6;
}

message IssueRouteCredentialRequest {
  string sandbox_uid = 1;
  uint32 target_port = 2;
}

message IssueRouteCredentialResponse {
  string credential = 1;
  int64 expires_at_unix_seconds = 2;
  int64 route_generation = 3;
}

message DeleteRequest {
  string sandbox_name = 1;    // CRD name (user-provided)
  string namespace = 2; // 可选，默认为 "default"
}

message DeleteResponse {
  bool success = 1;
}

// FailurePolicy 定义故障恢复策略
enum FailurePolicy {
  MANUAL = 0;        // 仅报告状态，不自动恢复
  AUTO_RECREATE = 1; // 自动重新调度
}

message UpdateRequest {
  string sandbox_name = 1;  // CRD name (user-provided)
  string namespace = 2;

  // 可更新字段 (only one at a time, except labels)
  oneof update {
    int64 expire_time_seconds = 3;     // Unix timestamp, 0 = remove expiry
    string reset_revision = 4;         // ISO8601 timestamp, 触发重启
    FailurePolicy failure_policy = 5;  // 更新故障策略
    int32 recovery_timeout_seconds = 6;
  }

  // 标签更新 (可以与其他字段同时更新)
  map<string, string> labels = 7;
}

message UpdateResponse {
  bool success = 1;
  string message = 2;
  SandboxInfo sandbox = 3;  // 更新后的状态
}
